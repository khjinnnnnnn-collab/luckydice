<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리반 주사위 게임</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tone.js for sound effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        /* 폰트 설정 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; touch-action: manipulation; }

        /* 주사위 본체 3D 스타일링 */
        .dice {
            width: clamp(150px, 40vw, 250px);
            height: clamp(150px, 40vw, 250px);
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 20%;
            box-shadow: 
                20px 20px 40px #d1d5db,
                -20px -20px 40px #ffffff,
                inset 0px 0px 15px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 10%;
            box-sizing: border-box;
            transition: transform 0.1s;
        }

        /* 주사위 눈금(점) 스타일링 */
        .dot {
            width: clamp(20px, 8vw, 45px);
            height: clamp(20px, 8vw, 45px);
            background: radial-gradient(circle at 30% 30%, #ef4444, #b91c1c);
            border-radius: 50%;
            justify-self: center;
            align-self: center;
            visibility: hidden;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), 1px 1px 2px rgba(255,255,255,0.8);
        }

        /* 주사위 숫자에 따른 점 표시 규칙 */
        [data-value="1"] .center { visibility: visible; transform: scale(1.3); }
        [data-value="2"] .top-left, [data-value="2"] .bottom-right { visibility: visible; }
        [data-value="3"] .top-left, [data-value="3"] .center, [data-value="3"] .bottom-right { visibility: visible; }
        [data-value="4"] .top-left, [data-value="4"] .top-right, [data-value="4"] .bottom-left, [data-value="4"] .bottom-right { visibility: visible; }
        [data-value="5"] .top-left, [data-value="5"] .top-right, [data-value="5"] .center, [data-value="5"] .bottom-left, [data-value="5"] .bottom-right { visibility: visible; }
        [data-value="6"] .top-left, [data-value="6"] .top-right, [data-value="6"] .middle-left, [data-value="6"] .middle-right, [data-value="6"] .bottom-left, [data-value="6"] .bottom-right { visibility: visible; }

        /* 점 위치 지정 */
        .top-left { grid-area: 1 / 1 / 2 / 2; }
        .top-right { grid-area: 1 / 3 / 2 / 4; }
        .middle-left { grid-area: 2 / 1 / 3 / 2; }
        .center { grid-area: 2 / 2 / 3 / 3; }
        .middle-right { grid-area: 2 / 3 / 3 / 4; }
        .bottom-left { grid-area: 3 / 1 / 4 / 2; }
        .bottom-right { grid-area: 3 / 3 / 4 / 4; }

        /* 굴러가는 애니메이션 */
        @keyframes rollAnimation {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(105deg) scale(1.1); }
            50% { transform: rotate(190deg) scale(0.9); }
            75% { transform: rotate(285deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .rolling {
            animation: rollAnimation 0.3s infinite ease-in-out;
        }

        /* 통통 튀는 등장 애니메이션 */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden select-none">

    <!-- 제목 영역 -->
    <div class="mb-12 text-center pop-in" style="animation-delay: 0.1s;">
        <h1 class="text-4xl md:text-5xl font-extrabold text-indigo-900 drop-shadow-sm mb-2">🎲 행운의 주사위</h1>
        <p class="text-indigo-600 font-medium">버튼을 누르거나 화면을 터치하세요!</p>
    </div>

    <!-- 주사위 영역 -->
    <div class="relative pop-in" style="animation-delay: 0.2s;">
        <div id="dice" class="dice" data-value="1">
            <div class="dot top-left"></div>
            <div class="dot top-right"></div>
            <div class="dot middle-left"></div>
            <div class="dot center"></div>
            <div class="dot middle-right"></div>
            <div class="dot bottom-left"></div>
            <div class="dot bottom-right"></div>
        </div>
    </div>

    <!-- 결과 안내 텍스트 -->
    <div id="result-text" class="mt-8 text-2xl font-bold text-indigo-800 h-8 opacity-0 transition-opacity duration-300">
        결과: 1
    </div>

    <!-- 굴리기 버튼 -->
    <button id="roll-btn" class="mt-8 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-4 px-10 rounded-full shadow-xl transform transition-all duration-200 hover:scale-105 active:scale-95 text-xl md:text-2xl pop-in" style="animation-delay: 0.3s;" onclick="rollDice()">
        주사위 굴리기
    </button>

    <script>
        const dice = document.getElementById('dice');
        const rollBtn = document.getElementById('roll-btn');
        const resultText = document.getElementById('result-text');
        let isRolling = false;
        
        // Tone.js 신디사이저 설정 (효과음)
        let tickSynth, resultSynth;
        
        function initAudio() {
            if (!tickSynth) {
                // 굴러갈 때 나는 틱틱 소리
                tickSynth = new Tone.MembraneSynth({
                    pitchDecay: 0.01,
                    octaves: 2,
                    oscillator: { type: "square" },
                    envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.1 }
                }).toDestination();
                tickSynth.volume.value = -10;
            }
            if (!resultSynth) {
                // 결과가 나왔을 때 나는 뾰롱 소리
                resultSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" },
                    envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 1 }
                }).toDestination();
                resultSynth.volume.value = -5;
            }
        }

        async function playTickSound() {
            if (Tone.context.state !== 'running') await Tone.start();
            initAudio();
            tickSynth.triggerAttackRelease("G2", "64n");
        }

        async function playResultSound() {
            if (Tone.context.state !== 'running') await Tone.start();
            initAudio();
            resultSynth.triggerAttackRelease(["C5", "E5", "G5"], "8n");
        }

        function rollDice() {
            if (isRolling) return;
            
            // 초기화 및 상태 변경
            isRolling = true;
            rollBtn.disabled = true;
            rollBtn.classList.add('opacity-75', 'cursor-not-allowed');
            rollBtn.innerText = '굴러가는 중... 🎲';
            resultText.style.opacity = '0';
            
            // 애니메이션 시작
            dice.classList.add('rolling');
            
            // 브라우저 오디오 컨텍스트 시작 (사용자 제스처 필요)
            Tone.start();
            
            let tickCount = 0;
            
            // 0.1초마다 주사위 눈금 무작위 변경 및 소리 재생
            let interval = setInterval(() => {
                const randomValue = Math.floor(Math.random() * 6) + 1;
                dice.setAttribute('data-value', randomValue);
                playTickSound();
                tickCount++;
            }, 100);

            // 1.5초 후 멈춤
            setTimeout(() => {
                clearInterval(interval);
                
                // 최종 결과
                const finalValue = Math.floor(Math.random() * 6) + 1;
                dice.setAttribute('data-value', finalValue);
                
                // 애니메이션 및 상태 복구
                dice.classList.remove('rolling');
                playResultSound();
                
                // 결과 텍스트 표시
                resultText.innerText = `결과: ${finalValue}`;
                resultText.style.opacity = '1';
                
                // 버튼 복구
                isRolling = false;
                rollBtn.disabled = false;
                rollBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                rollBtn.innerText = '주사위 굴리기';
                
                // 멈출 때 약간의 반동 애니메이션
                dice.style.transform = 'scale(1.1)';
                setTimeout(() => { dice.style.transform = 'scale(1)'; }, 150);
                
            }, 1500);
        }

        // 키보드 스페이스바나 엔터키로도 굴릴 수 있게 지원
        document.addEventListener('keydown', (event) => {
            if ((event.code === 'Space' || event.code === 'Enter') && !isRolling) {
                rollDice();
            }
        });
    </script>
</body>
</html>
